<!DOCTYPE html>
<!--
  TeknikkTorget — Cart page
  Blueprint §5.4: free-shipping bar, zip estimator, promo, summary, secure CTA.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cart — TeknikkTorget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
<link href="css/a11y.css" rel="stylesheet">
<link href="css/retro.css" rel="stylesheet">
</head>
<body>

<a href="#tt-main" class="tt-skip-link">Skip to main content</a>

<header class="tt-navbar">
  <div class="container-fluid d-flex align-items-center" style="max-width:1440px;height:64px;gap:1rem">
    <a href="index.html" class="tt-brand">TeknikkTorget</a>
    <div class="tt-search d-none d-md-block flex-grow-1" style="max-width:420px">
      <span class="material-symbols-outlined search-icon" aria-hidden="true">search</span>
      <input id="tt-search-input" type="search" class="form-control" placeholder="Search catalog… (Ctrl+K)"
             role="combobox" aria-autocomplete="list" aria-controls="tt-search-dropdown" aria-expanded="false" autocomplete="off">
      <div id="tt-search-dropdown" class="tt-search-dropdown" role="listbox" style="display:none"></div>
    </div>
    <nav class="ms-auto d-none d-lg-flex align-items-center gap-3" aria-label="Primary">
      <a class="nav-link" data-tt-nav="index.html" href="index.html">Home</a>
      <a class="nav-link" data-tt-nav="catalog.html" href="catalog.html">Catalog</a>
      <a class="nav-link active" data-tt-nav="cart.html" href="cart.html">Cart</a>
    </nav>
    <button class="tt-icon-btn ms-2" data-tt-retro-toggle aria-pressed="false" aria-label="Toggle Retro Mode">
      <span class="material-symbols-outlined" aria-hidden="true">history</span>
    </button>
    <button class="tt-icon-btn" data-tt-a11y-toggle aria-label="Accessibility">
      <span class="material-symbols-outlined" aria-hidden="true">accessibility</span>
    </button>
    <button class="tt-icon-btn" type="button" onclick="TT.openMiniCart()" aria-label="Open cart">
      <span class="material-symbols-outlined" aria-hidden="true">shopping_cart</span>
      <span class="badge-pill" data-tt-cart-badge style="display:none">0</span>
    </button>
  </div>
</header>

<main id="tt-main">
  <nav class="container-fluid tt-breadcrumb" style="max-width:1440px" aria-label="Breadcrumb">
    <a href="index.html">Home</a> <span aria-hidden="true">›</span>
    <a href="catalog.html">Catalog</a> <span aria-hidden="true">›</span>
    <span aria-current="page">Cart</span>
  </nav>

  <div class="container-fluid pb-5" style="max-width:1440px">
    <h1 class="h3 fw-bold mb-3">Your cart</h1>
    <div class="row g-4">
      <section class="col-lg-8" aria-labelledby="tt-cart-rows-title">
        <h2 id="tt-cart-rows-title" class="visually-hidden">Cart items</h2>
        <div id="tt-cart-rows" class="bg-white rounded p-3" style="border:1px solid var(--tt-border-subtle)"></div>
      </section>
      <aside class="col-lg-4" id="tt-cart-summary" aria-label="Order summary"></aside>
    </div>
  </div>
</main>

<footer class="tt-footer">
  <div class="container-fluid" style="max-width:1440px">
    <div class="copyright">© 2026 TeknikkTorget AS</div>
  </div>
</footer>

<button type="button" class="tt-help-fab" data-bs-toggle="modal" data-bs-target="#tt-help-modal" aria-label="Open help">
  <span class="material-symbols-outlined" aria-hidden="true">help</span>
</button>
<div class="modal fade" id="tt-help-modal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
  <div class="modal-header"><h2 class="modal-title h5">Need help?</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div>
  <div class="modal-body small">Stuck on shipping or promo codes? Try <strong>TT10</strong> for 10% off, or contact support.</div>
</div></div></div>

<div class="tt-minicart-backdrop" onclick="TT.closeMiniCart()"></div>
<aside class="tt-minicart" aria-label="Mini cart" aria-hidden="false">
  <div class="head">
    <h2>Cart <span id="tt-minicart-count" class="text-muted small fw-normal">(0)</span></h2>
    <button type="button" class="btn-close" onclick="TT.closeMiniCart()" aria-label="Close cart"></button>
  </div>
  <div id="tt-minicart-body" class="body"></div>
  <div class="foot">
    <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><strong id="tt-minicart-subtotal">kr 0</strong></div>
    <a href="cart.html" class="btn btn-primary w-100 mb-2">View cart &amp; checkout</a>
    <button type="button" class="btn btn-link w-100" onclick="TT.closeMiniCart()">Continue shopping</button>
  </div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="data/products.js" defer></script>
<script src="js/main.js" defer></script>
<script src="js/ui-components.js" defer></script>
<script src="js/a11y.js" defer></script>
<script src="js/retro.js" defer></script>
<script src="js/cart.js" defer></script>
</body>
</html>
